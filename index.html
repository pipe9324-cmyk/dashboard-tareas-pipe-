  @media (max-width: 480px) { .horizon-tabs { grid-template-columns: repeat(3, 1fr); gap: 6px; } .focus-primary-row { flex-direction: column; } }

  function extractTask(raw) {
    const pv = raw.properties_value || {};
    const title = plainText(pv['Tarea pipe']) || '(sin título)';
    const estado = pv['Hecho'] && pv['Hecho'].name ? pv['Hecho'].name : null;
    const fecha = pv['FECHA ACCION'] && pv['FECHA ACCION'].start ? pv['FECHA ACCION'].start : null;
    const priority = pv['Priority'] && pv['Priority'].name ? pv['Priority'].name : null;
    let proyecto = null;
    const proj = pv['Proyecto (texto)'];
    if (proj) {
      if (Array.isArray(proj.array)) {
        const names = proj.array.map(item => {
          if (item.title) return plainText(item.title);
          if (item.rich_text) return plainText(item.rich_text);
          return null;
        }).filter(Boolean);
        proyecto = names.length ? names.join(', ') : null;
      } else if (typeof proj === 'string') {
        proyecto = proj;
      } else if (proj.name) {
        proyecto = proj.name;
      }
    }
    if (!proyecto) {
      const rel = pv['📁 Proyectos'];
      if (Array.isArray(rel) && rel.length) {
        const names = rel.map(item => {
          const raw2 = typeof item === 'string' ? item : (item.url || item.id || item.page_id || '');
          const id = normalizeId(raw2);
          return id && PROJECT_MAP[id] ? PROJECT_MAP[id] : null;
        }).filter(Boolean);
        proyecto = names.length ? names.join(', ') : null;
      }
    }
    return { t: title, s: estado, d: fecha, q: priority, p: proyecto || 'Sin proyecto', u: raw.url };
  }

  function qcode(rawQ) {
    if (!rawQ) return null;
    const m = String(rawQ).match(/C[1-4]/);
    return m ? m[0] : null;
  }
  function toDateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function parseISODateLocal(isoStr) {
    if (!isoStr) return null;
    const [y, m, d] = isoStr.slice(0, 10).split('-').map(Number);
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d);
  }
  function inHorizon(t, h) {
    const W = WINDOWS;
    const d = t.date;
    if (h === 'sinfecha') return t.s === 'ATRASADO' && !d;
    if (h === 'atrasadas') return !t.completed && d && d < W.TODAY;
    if (!d) return false;
    if (h === 'hoy') return d.getTime() === W.TODAY.getTime();
    if (h === 'semana') return d >= W.WEEK_START && d <= W.WEEK_END;
    if (h === 'mes') return d >= W.MONTH_START && d <= W.MONTH_END;
    if (h === 'trimestre') return d >= W.QUARTER_START && d <= W.QUARTER_END;
    return false;
  }
  function horizonStats(h) {
    const items = TASKS.filter(t => inHorizon(t, h));
    const s = { total: items.length, done: 0, dismissed: 0, progress: 0, notStarted: 0, overdue: 0, pending: 0, items };
    items.forEach(t => {
      if (t.s === 'Done') s.done++;
      else if (t.s === 'No lo Hare') s.dismissed++;
      else {
        s.pending++;
        if (t.s === 'ATRASADO') s.overdue++;
        else if (t.s === 'In progress' || t.s === 'In Progress') s.progress++;
        else s.notStarted++;
      }
    });
    return s;
  }
  function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function computeWindows() {
    const now = new Date();
    const TODAY = toDateOnly(now);
    const day = TODAY.getDay();
    const isoOffset = (day === 0) ? 6 : day - 1;
    const WEEK_START = new Date(TODAY); WEEK_START.setDate(TODAY.getDate() - isoOffset);
    const WEEK_END = new Date(WEEK_START); WEEK_END.setDate(WEEK_START.getDate() + 6);
    const MONTH_START = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
    const MONTH_END = new Date(TODAY.getFullYear(), TODAY.getMonth() + 1, 0);
    const qStartMonth = Math.floor(TODAY.getMonth() / 3) * 3;
    const QUARTER_START = new Date(TODAY.getFullYear(), qStartMonth, 1);
    const QUARTER_END = new Date(TODAY.getFullYear(), qStartMonth + 3, 0);
    return { TODAY, WEEK_START, WEEK_END, MONTH_START, MONTH_END, QUARTER_START, QUARTER_END };
  }
  let WINDOWS = null;
  let TASKS = [];

  async function load() {
    const dot = document.getElementById('live-dot');
    const eyebrow = document.getElementById('eyebrow-text');
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    try {
      const res = await fetch(WEBHOOK_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      if (!Array.isArray(raw)) throw new Error('La respuesta no es un array. Revisa el Body del módulo Webhook response.');
      WINDOWS = computeWindows();
      TASKS = raw
        .map(extractTask)
        .map(t => ({ ...t, q: qcode(t.q), done: t.s === 'Done', dismissed: t.s === 'No lo Hare' }))
        .map(t => ({ ...t, completed: t.done || t.dismissed, date: parseISODateLocal(t.d) }))
        .filter(t => ['atrasadas','hoy','semana','mes','trimestre','sinfecha'].some(h => inHorizon(t, h)));
      const now = new Date();
      eyebrow.textContent = 'TAREAS PIPE · actualizado ' + now.toLocaleDateString('es-CO', {weekday:'long', day:'numeric', month:'long'}) + ' ' + now.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
      dot.classList.remove('stale');
      renderProjectsOverview();
      buildUI();
    } catch (err) {
      dot.classList.add('stale');
      eyebrow.textContent = 'No se pudo conectar con Make';
      document.getElementById('projects-overview').innerHTML = '';
      const app = document.getElementById('app');
      app.className = 'state-msg error';
      app.textContent = 'No pude traer los datos en vivo:\n\n' + err.message + '\n\nVerifica que el escenario de Make esté ACTIVO (interruptor ON).';
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function renderProjectsOverview() {
    const el = document.getElementById('projects-overview');
    const byP = {};
    TASKS.forEach(t => {
      if (t.completed) return;
      const p = t.p || 'Sin proyecto';
      if (p === 'Sin proyecto') return;
      byP[p] = byP[p] || { total: 0, late: 0 };
      byP[p].total++;
      if (t.date && t.date < WINDOWS.TODAY) byP[p].late++;
    });
    const projects = Object.keys(byP).sort((a,b) => byP[b].total - byP[a].total);
    if (projects.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML =
      '<p class="section-label">📁 Proyectos activos</p>' +
      '<div class="projects-strip">' +
      projects.map(p => `
        <div class="project-card">
          <div class="pn">${escapeHtml(p)}</div>
          <div class="pc-row">
            <span class="pc">${byP[p].total}</span>
            <span class="pc-label">abiertas</span>

      '</div>';
  }

  function renderQuadrantChart(visible) {
    const el = document.getElementById('qchart');
    const counts = { C1:0, C2:0, C3:0, C4:0, none:0 };
    visible.forEach(t => { counts[t.q || 'none']++; });
    const max = Math.max(1, ...Object.values(counts));
    const rows = [
      ['C1', 'C1 · Urgente/Import.', QCOLORS.C1],
      ['C2', 'C2 · Importante', QCOLORS.C2],
      ['C3', 'C3 · Urgente', QCOLORS.C3],
      ['C4', 'C4 · Ni una ni otra', QCOLORS.C4],
      ['none', 'Sin prioridad', QCOLORS.none],

    el.innerHTML = '<div class="qchart">' + rows.map(([key, label, color]) => `
      <div class="qchart-row">
        <span class="qchart-label">${label}</span>
        <div class="qchart-track"><div class="qchart-fill" style="width:${(counts[key]/max*100).toFixed(0)}%; background:${color}"></div></div>
        <span class="qchart-count">${counts[key]}</span>
      </div>
    `).join('') + '</div>';
  }

  function renderDonut(stats) {
    const el = document.getElementById('donut-panel');
    if (activeHorizon === 'atrasadas' || activeHorizon === 'sinfecha' || stats.total === 0) { el.innerHTML = ''; return; }
    const segs = [
      ['Hechas', stats.done, '#4E9B6E', 'done'],
      ['En progreso', stats.progress, '#3B5FE0', 'progress'],
      ['Sin empezar', stats.notStarted, '#B8A575', 'notStarted'],
      ['Atrasadas', stats.overdue, '#E14A45', 'overdue'],
      ['No lo haré', stats.dismissed, '#8B8171', 'dismissed'],
    ];
    const arcSegs = segs.filter(s => s[1] > 0);
    let acc = 0;
    const stops = arcSegs.map(([label, n, color]) => {
      const from = acc / stats.total * 360;
      acc += n;
      const to = acc / stats.total * 360;
      return `${color} ${from.toFixed(1)}deg ${to.toFixed(1)}deg`;
    }).join(', ');
    el.innerHTML = `
      <div class="donut-card">
        <div class="donut" style="background: conic-gradient(${stops})">
          <div class="donut-hole"><span class="dh-n">${stats.done}/${stats.total}</span><span class="dh-l">hechas</span></div>
        </div>
        <div class="donut-legend">${segs.map(([label, n, color, key]) =>
          '<span class="li' + (activeStatusFilter===key?' active':'') + '" data-status="' + key + '"><span class="sw" style="background:' + color + '"></span>' + label + ': <b>' + n + '</b></span>'
        ).join('')}</div>
      </div>`;
    el.querySelectorAll('.donut-legend .li').forEach(li => {
      li.addEventListener('click', () => {
        const key = li.dataset.status;
        activeStatusFilter = (activeStatusFilter === key) ? null : key;
        renderContent();
      });
    });
  }

  function renderContent() {
    const content = document.getElementById('content');
    content.innerHTML = '';
    const stats = horizonStats(activeHorizon);
    renderDonut(stats);
    const STATUS_TEST = {
      done: t => t.s === 'Done',
      dismissed: t => t.s === 'No lo Hare',
      progress: t => t.s === 'In progress' || t.s === 'In Progress',
      overdue: t => t.s === 'ATRASADO',
      notStarted: t => !t.completed && t.s !== 'ATRASADO' && t.s !== 'In progress' && t.s !== 'In Progress',
    };

    let visible, filterLabel = null;
    if (activeStatusFilter) {
      visible = stats.items.filter(STATUS_TEST[activeStatusFilter]);

  function renderGroups(container, visible) {

      const byQ = {};
      visible.forEach(t => { const q = t.q || 'none'; (byQ[q] = byQ[q] || []).push(t); });
      QORDER.forEach(q => { if (byQ[q]) container.appendChild(buildGroup(QLABELS[q].n, QLABELS[q].s, QCOLORS[q], byQ[q])); });
    } else {
      const byP = {};
      visible.forEach(t => { (byP[t.p] = byP[t.p] || []).push(t); });
      const buckets = { 0: [], 1: [], 2: [], 3: [] };
      Object.keys(byP).forEach(p => {
        const rank = STATUS_RANK[PROJECT_STATUS[p]];
        buckets[rank === undefined ? 3 : rank].push(p);
      });
      [0,1,2,3].forEach(rank => {
        if (!buckets[rank].length) return;
        buckets[rank].sort((a,b) => byP[b].length - byP[a].length);
        const h = document.createElement('div');
        h.className = 'project-section-label';
        h.textContent = STATUS_SECTION_LABEL[rank];
        container.appendChild(h);
        buckets[rank].forEach(p => {
          const cat = PROJECT_STATUS[p];
          const color = cat ? FOCUS_COLORS[cat] : '#BBA980';
          container.appendChild(buildGroup(p, '', color, byP[p]));
        });
      });
    }
  }

  function statusTag(t) {
    if (t.s === 'Done') return '<span class="status-tag st-done">hecha</span>';
    if (t.s === 'No lo Hare') return '<span class="status-tag st-dismissed">no lo haré</span>';
    if (t.s === 'ATRASADO') return '<span class="status-tag st-overdue">atrasada</span>';
    if (t.s === 'In progress' || t.s === 'In Progress') return '<span class="status-tag st-progress">en progreso</span>';
    return '<span class="status-tag st-notstarted">sin empezar</span>';
  }

  function buildGroup(name, sub, color, items) {
    const g = document.createElement('div');
    g.className = 'group';
    g.style.setProperty('--group-color', color);
    g.innerHTML =
      '<div class="group-head">' +
        '<span class="chevron">▸</span>' +
        '<span class="group-dot" style="background:' + color + '"></span>' +
        '<span class="group-name">' + escapeHtml(name) + '</span>' +
        (sub ? '<span class="group-sub">' + escapeHtml(sub) + '</span>' : '') +
        '<span class="group-count">' + items.length + '</span>' +
      '</div>';
    g.querySelector('.group-head').addEventListener('click', () => { g.classList.toggle('open'); });
    const list = document.createElement('div');
    list.className = 'group-list';
    items.forEach(t => {
      const a = document.createElement('a');
      a.href = t.u; a.target = '_blank'; a.rel = 'noopener';
      a.className = 'task-row' + (!t.completed && t.date && t.date < WINDOWS.TODAY ? ' late' : '');
      a.innerHTML = '<span class="bullet"></span><span>' + escapeHtml(t.t) + '</span>' + statusTag(t);
      list.appendChild(a);
    });
    g.appendChild(list);
    return g;
  }

  document.getElementById('refresh-btn').addEventListener('click', load);
  renderFocusSection();
  load();
</script>
</body>
</html>
